strategy:
  plugin: "four_pillars_v384"

four_pillars:
  allow_a: true
  allow_b: true
  allow_c: false
  sl_atr_mult: 2.0
  tp_atr_mult: 4.0   # 4x ATR TP on every trade (was null = no TP)

risk:
  max_positions: 25       # 47 coins, allow up to 25 concurrent (25 * $75 = $1875 margin, well within 102k VST)
  max_daily_trades: 200   # scaled for 53 coins
  daily_loss_limit_usd: 2000.0  # demo mode, let it run
  min_atr_ratio: 0.003

position:
  margin_usd: 75.0
  leverage: 20
  margin_mode: "ISOLATED"
  sl_working_type: "MARK_PRICE"
  tp_working_type: "MARK_PRICE"

notification:
  daily_summary_utc_hour: 17
